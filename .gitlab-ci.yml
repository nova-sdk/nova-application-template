stages:
  - lint
  - test
  - package
  - container

variables:
  GIT_STRATEGY: clone

before_script:
  - curl https://code.ornl.gov/rse-deployment/rse-sharables/raw/master/rse-bash-modules.sh -O
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - source rse-bash-modules.sh
  - func_rse_docker_cleanup

after_script:
  - curl https://code.ornl.gov/rse-deployment/rse-sharables/raw/master/rse-bash-modules.sh -O
  - source rse-bash-modules.sh
  - func_rse_docker_cleanup

lint-check:
  stage: lint
  script:
    - docker build -f dockerfiles/Dockerfile --target source -t app .
    - docker run -u `id -u`:`id -g` app poetry run ruff check
    - docker run -u `id -u`:`id -g` app poetry run ruff format --check
    - docker run -u `id -u`:`id -g` app poetry run mypy .
  tags:
    - rse-multi-builder

unit-tests:
  stage: test
  script:
    - mkdir reports
    - docker build -f dockerfiles/Dockerfile --target source -t app .
    - docker run -u `id -u`:`id -g` -v `pwd`/reports:/src/reports app poetry run coverage run
    - docker run -u `id -u`:`id -g` -v `pwd`/reports:/src/reports app poetry run coverage report
    - docker run -u `id -u`:`id -g` -v `pwd`/reports:/src/reports app poetry run coverage xml -o reports/coverage.xml
  artifacts:
    when: always
    reports:
      junit: reports/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: reports/coverage.xml
  tags:
    - rse-multi-builder

