_subdirectory: template_sources
_templates_suffix: .j2
_exclude:
    - copier.yml
    - "*.py[co]"
    - __pycache__
    - .git
    - name-slug

project_name:
    type: str
    help: What is your project name?

python_package:
    type: str
    help: What is your Python package name (use Python naming conventions)?
    default: "{% include 'name_slug.j2' %}"

publish_to_pypi:
    type: bool
    help: Publish to PiPy?
    default: no

publish_docs:
    type: bool
    help: Publish documentation to readthedocs.io?
    default: no
