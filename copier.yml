_subdirectory: template_sources
_templates_suffix: .j2
_exclude:
    - copier.yml
    - "*.py[co]"
    - __pycache__
    - .git
    - name-slug

project_name:
    type: str
    help: What is your project name?

python_package:
    type: str
    help: What is your Python package name (use Python naming conventions, use dots to create submodules)?
    default: "{% include 'name_slug.j2' %}"

use_mantid:
    type: bool
    help: Do you want to install Mantid for your project?
    default: no

gui:
    type: bool
    help: Are you developing a GUI application using MVVM pattern?
    default: no

framework:
    type: str
    help: Which library will you use?
    choices:
        - Trame
        - PyQt5
        - PyQt6
    default: Trame
    when: "{{ gui }}"

multitabs:
    type: bool
    help: Do you want a template with multiple tabs?
    default: no
    when: "{{ gui and framework=='Trame' }}"

publish_to_pypi:
    type: bool
    help: Publish to PyPI?
    default: no

publish_docs:
    type: bool
    help: Publish documentation to readthedocs.io?
    default: no

_message_after_copy: |
    Your project "{{ project_name }}" has been created successfully!

    Next steps:

    1. Change directory to the project root:

       $ cd {{ _copier_conf.dst_path }}

    2. Read "DEVELOPMENT.md".
    
    3. Install project dependencies and setup pre-commit:
       $ poetry install
       $ pre-commit install    
    
    4. Initialize Git repository and push to GitLab:
       $ poetry run init-repo
       
       This will set up the repository at:
       https://code.ornl.gov/ndip/tool-sources/{{ project_name.lower().replace(' ', '-').replace('_', '-') }}
    
    5. Push the tool XML file to the Galaxy tools repository:
       $ poetry run push-xml
       
       This will add/update your tool XML in the Galaxy tools repository.

    6. Test if the application runs:
       $ poetry run app
        
       If there are any problems with dependencies (like PyQt) you might need to install/update system libraries.
    
    7. Start coding :).