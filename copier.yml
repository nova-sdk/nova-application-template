_subdirectory: template_sources
_templates_suffix: .j2
_exclude:
    - copier.yml
    - "*.py[co]"
    - __pycache__
    - .git
    - name-slug

project_name:
    type: str
    help: What is your project name?

python_package:
    type: str
    help: A Python package name
    default: "{% include 'name_slug.j2' %}"
