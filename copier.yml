_subdirectory: template_sources
_templates_suffix: .j2
_exclude:
    - copier.yml
    - "*.py[co]"
    - __pycache__
    - .git
    - name-slug

project_name:
    type: str
    help: What is your project name?

python_package:
    type: str
    help: What is your Python package name (use Python naming conventions, use dots to create submodules)?
    default: "{% include 'name_slug.j2' %}"

use_mantid:
    type: bool
    help: Do you want to install Mantid for your project?
    default: no

gui:
    type: bool
    help: Are you developing a GUI application using MVVM pattern?
    default: no

framework:
    type: str
    help: Which library will you use?
    choices:
        - Trame
        - PyQt5
        - PyQt6
    default: Trame
    when: "{{ gui }}"

multitabs:
    type: bool
    help: Do you want a template with multiple tabs?
    default: no
    when: "{{ gui and framework=='Trame' }}"

publish_to_pypi:
    type: bool
    help: Publish to PyPI?
    default: no

publish_docs:
    type: bool
    help: Publish API documentation to readthedocs.io?
    default: no

_message_after_copy: |
    Your project "{{ project_name }}" has been created successfully!

    Next steps:

    1. Change directory to the project root:

       $ cd {{ _copier_conf.dst_path }}

    2. Read "DEVELOPMENT.md"!
    
    3. Install project dependencies and setup pre-commit
        $ poetry install
        $ git init
        $ pre-commit install    
    4. Test if the application runs
        $ poetry run app
        
        if there are any problems with dependencies (like PyQT) you might need to install/update system libraries.
    5. Start coding :). Don't forget about writing documentation (see DEVELOPMENT.md)!