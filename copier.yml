_subdirectory: template_sources
_templates_suffix: .j2
_exclude:
    - copier.yml
    - "*.py[co]"
    - __pycache__
    - .git
    - name-slug

project_name:
    type: str
    help: What is your project name?

python_package:
    type: str
    help: What is your Python package name (use Python naming conventions)?
    default: "{% include 'name_slug.j2' %}"

use_mantid:
    type: bool
    help: Do you want to install Mantid for your project?
    default: no

gui:
    type: bool
    help: Are you developing a GUI application using MVVM pattern?
    default: no

framework:
    type: str
    help: Which library will you use?
    choices:
        - Trame
        - PyQT5
        - PyQT6
    default: Trame
    when: "{{ gui }}"

multitabs:
    type: bool
    help: Do you want a template with multiple tabs?
    default: no
    when: "{{ gui }}"

publish_to_pypi:
    type: bool
    help: Publish to PyPI?
    default: no

publish_docs:
    type: bool
    help: Publish documentation to readthedocs.io?
    default: no
